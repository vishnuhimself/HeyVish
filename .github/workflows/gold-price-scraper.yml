name: Gold Price Scraper

on:
  schedule:
    # Runs at 5:00 AM UTC (10:30 AM IST)
    - cron: '0 5 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  scrape-gold-price:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        npm install cheerio axios @neondatabase/serverless

    - name: Scrape gold price and update database
      run: |
        node scripts/scrape-gold-price.mjs
      env:
        # Neon Postgres connection string. Add this as a repository secret:
        # Settings -> Secrets and variables -> Actions -> New repository secret
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
